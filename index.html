<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MuscleBoost</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  font-family: -apple-system;
  background: #0f172a;
  color: white;
  margin:0;
}

.header {
  padding:15px;
  text-align:center;
  font-size:18px;
  background:#020617;
}

.container { padding:15px; }

.card {
  background:#1e293b;
  padding:15px;
  border-radius:16px;
  margin-bottom:15px;
}

.timer {
  font-size:48px;
  text-align:center;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
}

.start { background:#22c55e; }
.pause { background:#f59e0b; }
.reset { background:#ef4444; }

.calendar {
  display:grid;
  grid-template-columns: repeat(7,1fr);
  gap:5px;
}

.day {
  background:#020617;
  padding:8px;
  border-radius:8px;
  font-size:12px;
}

.done { background:#22c55e; color:black; }

.score {
  font-size:20px;
  text-align:center;
}
</style>
</head>

<body>

<div class="header">MuscleBoost</div>

<div class="container">

<div class="card">
<div id="dayType"></div>
<div id="exercise"></div>
<div class="timer" id="timer">00:40</div>
<div id="instruction"></div>

<button class="start" onclick="start()">Start</button>
<button class="pause" onclick="pause()">Pause</button>
<button class="reset" onclick="reset()">Reset</button>
</div>

<div class="card">
<div class="score" id="score">Adesão: 0%</div>
<div class="calendar" id="calendar"></div>
</div>

</div>

<script>
let dayIndex = new Date().getDate()%3;
let currentExercise=0;
let time=40;
let interval=null;
let isRest=false;

const programs=[
["Dia A","Flexões","Peito"],
["Dia B","Core","Abdómen"],
["Dia C","Braços","Tríceps"]
];

function getWorkTime(){
  const start=new Date("2026-01-01");
  const now=new Date();
  const weeks=Math.floor((now-start)/(1000*60*60*24*7));
  return Math.min(40+weeks*2,60);
}

function update(){
  document.getElementById("dayType").innerText=programs[dayIndex][0];
  document.getElementById("exercise").innerText=isRest?"Descanso":programs[dayIndex][1];
  document.getElementById("instruction").innerText=isRest?"":programs[dayIndex][2];
  document.getElementById("timer").innerText="00:"+String(time).padStart(2,'0');
}

function start(){
  if(interval)return;
  time=getWorkTime();
  interval=setInterval(()=>{
    time--;
    if(time<=0){
      if(!isRest){isRest=true;time=20;}
      else{
        isRest=false;
        currentExercise++;
        if(currentExercise>=5){
          saveDay();
          alert("Done");
          clearInterval(interval);
          interval=null;
          return;
        }
        time=getWorkTime();
      }
    }
    update();
  },1000);
}

function pause(){clearInterval(interval);interval=null;}
function reset(){
  clearInterval(interval);
  interval=null;
  currentExercise=0;
  isRest=false;
  time=getWorkTime();
  update();
}

function saveDay(){
  let days=JSON.parse(localStorage.getItem("days")||"[]");
  const today=new Date().toISOString().slice(0,10);
  if(!days.includes(today)){days.push(today);}
  localStorage.setItem("days",JSON.stringify(days));
  renderCalendar();
}

function renderCalendar(){
  let cal=document.getElementById("calendar");
  cal.innerHTML="";
  let days=JSON.parse(localStorage.getItem("days")||"[]");
  let count=0;

  for(let i=1;i<=30;i++){
    let d=document.createElement("div");
    d.className="day";
    let date=new Date();
    date.setDate(i);
    let key=date.toISOString().slice(0,10);

    if(days.includes(key)){d.classList.add("done");count++;}
    d.innerText=i;
    cal.appendChild(d);
  }

  document.getElementById("score").innerText=
    "Adesão: "+Math.round((count/30)*100)+"%";
}

renderCalendar();
update();
</script>

</body>
</html>
