<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MuscleBoost</title>

<style>
body {margin:0;font-family:-apple-system;background:#020617;color:white;display:flex;justify-content:center;align-items:center;height:100vh;}
.app {width:90%;max-width:400px;text-align:center;}
.exercise {font-size:26px;}
.timer {font-size:70px;margin:15px 0;}
button {width:100%;padding:12px;margin-top:8px;border:none;border-radius:12px;}
.start {background:#22c55e;}
.pause {background:#f59e0b;}
.reset {background:#ef4444;}
.secondary {background:#334155;}
.calendar {display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:15px;}
.day {padding:6px;border-radius:6px;font-size:11px;background:#0f172a;}
.done {background:#22c55e;color:black;}
</style>
</head>

<body>

<div class="app">
<div class="exercise" id="exercise">Ready</div>
<div class="timer" id="timer">40</div>

<button class="start" onclick="start()">Start</button>
<button class="pause" onclick="pause()">Pause</button>
<button class="reset" onclick="resetSession()">Reset</button>
<button class="secondary" onclick="skip()">Saltar exercício</button>
<button class="secondary" onclick="markDone()">Marcar treino</button>

<div class="calendar" id="calendar"></div>
</div>

<script>
let exercises=["Push-ups","Decline","Pike","Diamond","Plank"];
let index=0,time=40,isRest=false,interval=null;

const ctx=new(window.AudioContext||window.webkitAudioContext)();
function beep(f=800,d=0.1){
 const o=ctx.createOscillator(),g=ctx.createGain();
 o.connect(g);g.connect(ctx.destination);o.frequency.value=f;o.start();
 setTimeout(()=>o.stop(),d*1000);
}

function update(){
 document.getElementById("exercise").innerText=isRest?"Descanso":exercises[index];
 document.getElementById("timer").innerText=time;
}

function start(){
 if(interval)return;
 interval=setInterval(()=>{
  time--;
  if(time<=3)beep(1200,0.05);
  if(time<=0){
   beep(600,0.2);
   if(!isRest){isRest=true;time=15;}
   else{
    isRest=false;index++;
    if(index>=exercises.length){
     clearInterval(interval);interval=null;alert("Treino concluído");return;
    }
    time=40;
   }
  }
  update();
 },1000);
}

function pause(){clearInterval(interval);interval=null;}

function resetSession(){
 clearInterval(interval);interval=null;
 index=0;isRest=false;time=40;update();
}

function skip(){
 index++;if(index>=exercises.length)index=0;
 isRest=false;time=40;update();
}

function markDone(){
 let days=JSON.parse(localStorage.getItem("days")||"[]");
 let today=new Date().toISOString().slice(0,10);
 if(!days.includes(today))days.push(today);
 localStorage.setItem("days",JSON.stringify(days));
 renderCalendar();
}

function renderCalendar(){
 let cal=document.getElementById("calendar");
 cal.innerHTML="";
 let days=JSON.parse(localStorage.getItem("days")||"[]");
 for(let i=1;i<=30;i++){
  let d=document.createElement("div");
  d.className="day";
  let date=new Date();date.setDate(i);
  let key=date.toISOString().slice(0,10);
  if(days.includes(key))d.classList.add("done");
  d.innerText=i;cal.appendChild(d);
 }
}

renderCalendar();update();
</script>

</body>
</html>
